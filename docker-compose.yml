services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    # Миграции здесь: volume .:/app подменяет скрипт из образа, поэтому не полагаемся на entrypoint.sh
    command:
      [
        "/bin/sh",
        "-c",
        "python manage.py migrate --noinput && python manage.py collectstatic --noinput && exec gunicorn --bind 0.0.0.0:8000 config.wsgi:application",
      ]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: library
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
